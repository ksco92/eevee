name: Publish to npm

# Runs on every push to `main` (i.e. every PR merge) and on manual dispatch.
# Publishes the `flexdataset` version in packages/core/package.json IF and ONLY
# IF it is newer than what is already on the npm registry. PRs that forget to
# bump `version` become no-ops here — per CLAUDE.md the policy is "always bump",
# and a missing bump should be caught at review time.
#
# Authentication uses npm trusted publishing — the workflow exchanges its GitHub
# OIDC token for a short-lived npm credential. No long-lived NPM_TOKEN secret is
# needed; the trust is configured on the package at npmjs.com (the repo, the
# workflow filename `publish.yml`, and the `main` branch must match). Configure
# it for `flexdataset` before the first publish.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: packages/core

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
          registry-url: https://registry.npmjs.org
      # Trusted publishing (OIDC) requires npm >= 11.5.1; setup-node@v4 ships
      # npm 10.x with Node 22, so upgrade the CLI before any registry call.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Compare package.json version against the registry
        id: check
        run: |
          local_version=$(node -p "require('./package.json').version")
          registry_version=$(npm view flexdataset version 2>/dev/null || echo "0.0.0")
          echo "local=$local_version"       >> "$GITHUB_OUTPUT"
          echo "registry=$registry_version" >> "$GITHUB_OUTPUT"
          if [ "$local_version" = "$registry_version" ]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Version $local_version already on registry — no publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Local $local_version differs from registry $registry_version — publishing."
          fi

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public --provenance
