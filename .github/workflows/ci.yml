name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: packages/core/build/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - run: npm run build
      - run: npm pack --dry-run

  self-validate:
    # The validator must accept its own example dataset.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: node dist/src/cli.js validate ../../examples
      - name: Render diagrams and check SVG output
        run: |
          node dist/src/cli.js graph ../../examples --out /tmp/dag.svg
          node dist/src/cli.js er ../../examples --out /tmp/er.svg
          grep -q "<svg" /tmp/dag.svg
          grep -q "<svg" /tmp/er.svg

  python:
    # Lint and test the Python wrapper.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install -r requirements.txt
      - run: pip install -e .
      - name: Lint
        run: |
          python3 -m black --check ./src/ ./tests/
          python3 -m isort --check-only ./src/ ./tests/
          python3 -m flake8 --config=setup.cfg ./
      - name: Test
        run: python3 -m pytest tests/ --cov=src/flexdataset --cov-fail-under=95
