name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  binaries:
    # Cross-compile a standalone binary for every platform with bun and attach
    # them to the GitHub release. The wasm Graphviz renderer is bundled in.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
      - working-directory: packages/core
        run: npm ci
      - name: Compile standalone binaries
        working-directory: packages/core
        run: |
          mkdir -p dist-bin
          bun build src/cli.ts --compile --target=bun-linux-x64    --outfile dist-bin/fdd-linux-x64
          bun build src/cli.ts --compile --target=bun-linux-arm64  --outfile dist-bin/fdd-linux-arm64
          bun build src/cli.ts --compile --target=bun-darwin-x64   --outfile dist-bin/fdd-darwin-x64
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile dist-bin/fdd-darwin-arm64
          bun build src/cli.ts --compile --target=bun-windows-x64  --outfile dist-bin/fdd-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: packages/core/dist-bin/*
      - name: Attach binaries to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/core/dist-bin/*

  npm:
    needs: binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
      - working-directory: packages/core
        run: npm ci
      - working-directory: packages/core
        run: npm run build
      - working-directory: packages/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    needs: binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bins
      - name: Build platform wheels (each bundling its binary)
        working-directory: packages/python
        run: sh scripts/build_wheels.sh "$GITHUB_WORKSPACE/bins"
      - name: Publish to PyPI
        working-directory: packages/python
        run: |
          python3 -m pip install --upgrade twine
          python3 -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
